llm:
  # NOTE: This app uses the Anthropic API (console.anthropic.com).
  # A claude.ai consumer subscription (Claude Pro / Claude Max) does NOT cover
  # API usage. You must load credits at console.anthropic.com separately.
  provider: auto  # auto-detect from API key, or: claude, openai, gemini
  api_key: ${ANTHROPIC_API_KEY}  # or ${OPENAI_API_KEY} or ${GOOGLE_API_KEY}
  model: null  # null = provider default (claude-sonnet-4-6)
  extended_thinking: true
  # Extended thinking uses more tokens and costs more. It is opt-in per call
  # site and should only be used for complex reasoning tasks, not routine queries.
  max_tokens: 16000
  cheap_max_tokens: 4000

embeddings:
  provider: auto          # auto | gemini | openai | hash
  # model: gemini-embedding-2-preview   # or text-embedding-3-small for openai
  # dimensions: 768                     # 768 for gemini, 1536 for openai
  # NOTE: after switching providers, run `coach db rebuild --collection all`
  # Similarity thresholds (0.78-0.92) were tuned for hash fallback — may need
  # adjustment with real embedding models.

paths:
  journal_dir: ~/coach/journal
  chroma_dir: ~/coach/chroma
  intel_db: ~/coach/intel.db

# --- Free sources (no API keys needed) ---
sources:
  custom_blogs:
    - https://paulgraham.com/articles.html
    - https://www.joelonsoftware.com/
  rss_feeds:
    - https://news.ycombinator.com/rss
    - https://feeds.arstechnica.com/arstechnica/technology-lab
    - https://sifted.eu/feed
    - https://techcrunch.com/feed/
    - https://www.reddit.com/r/programming/.rss
    - https://www.reddit.com/r/MachineLearning/.rss
    - https://export.arxiv.org/rss/cs.AI
    - https://export.arxiv.org/rss/cs.LG
  # When rss_feeds covers HN/Reddit/arXiv, dedicated scrapers auto-disabled
  deduplicate_rss_sources: true
  # Semantic dedup: use vector similarity to skip near-duplicate articles across sources
  # Requires ChromaDB. Slightly slower scrapes but much cleaner feed.
  semantic_dedup: true
  semantic_dedup_threshold: 0.92  # 0.90-0.95; higher = stricter
  github_trending:
    enabled: true
    languages: [python, rust, go]
    timeframe: daily
  reddit:
    subreddits: [programming, MachineLearning]
    limit: 25
  producthunt:
    enabled: true
    max_items: 20
  yc_jobs:
    enabled: true
    max_items: 30
  google_patents:
    enabled: true
    # feeds:  # override default AI/ML + Networking feeds
    #   - https://patents.google.com/api/feed?q=CPC%3DG06N&num=20
    max_per_feed: 15
  ai_capabilities:
    enabled: true
    sources: [metr, chatbot_arena, helm]
    max_items_per_source: 10
  indeed_hiring_lab:
    enabled: false  # requires Indeed API access
    change_threshold: 5.0
    max_items: 8
  google_trends:
    enabled: true
    keywords: [AI agents, LLM fine-tuning, rust programming]
    spike_threshold: 20.0
    timeframe: "today 1-m"
  crunchbase:
    enabled: false  # requires API key — get free key at crunchbase.com/api
    # api_key: ${CRUNCHBASE_API_KEY}
    categories: [artificial-intelligence, developer-tools, saas]
    days_back: 7
    max_items: 20
  x_list:
    enabled: false  # requires X API v2 bearer token
    # bearer_token: ${X_BEARER_TOKEN}
    # list_id: "1234567890"    # your X List ID
    # max_tweets: 100
  enabled:
    - hn_top
    - rss_feeds
    - custom_blogs
    - github_trending
    - reddit
    - arxiv
    - producthunt
    - yc_jobs
    - google_patents
    - ai_capabilities
    - google_trends
    # - indeed_hiring_lab  # requires Indeed API access
    # - crunchbase         # requires API key

schedule:
  weekly_review: "sunday 9am"
  intelligence_gather: "daily 6am"

company_movement:
  enabled: true
  min_significance: 0.45
  run_cron: "0 */6 * * *"
  lookback_days: 14

hiring:
  enabled: true
  spike_multiplier: 2.0
  min_post_count: 5
  min_family_count: 3
  min_geo_count: 3
  run_cron: "0 */12 * * *"
  lookback_days: 14

regulatory:
  enabled: true
  min_relevance: 0.5
  run_cron: "0 */12 * * *"
  lookback_days: 30

# --- Optional: journal templates ---
# journal:
#   templates:
#     standup:
#       name: "Standup"
#       type: "daily"
#       content: "## Yesterday\n\n## Today\n\n## Blockers\n"

entity_extraction:
  enabled: true
  schedule_minutes: 30

research:
  enabled: true
  search_provider: tavily  # or duckduckgo (free, no key needed)

recommendations:
  enabled: true
  delivery:
    methods: [journal]

# --- Profile ---
profile:
  path: ~/coach/profile.yaml
  interview_refresh_days: 90

# --- Events ---
events:
  enabled: true
  sources: [confs_tech, rss_events]
  location_filter: true  # use profile.location
  rss_feeds:
    - https://confs.tech/rss
  eventbrite_token: ${EVENTBRITE_TOKEN}  # optional — set in Settings or env

# --- Learning Paths ---
learning_paths:
  dir: ~/coach/learning_paths
  default_weekly_hours: 5

# --- Project Discovery ---
projects:
  github_issues:
    enabled: true
    # token: ${GITHUB_TOKEN}  # optional, increases rate limit
    labels: [good-first-issue, help-wanted]

# --- Memory: distilled fact store from journal entries ---
memory:
  enabled: true
  max_facts_per_entry: 5
  max_context_facts: 25
  high_confidence_threshold: 0.9
  consolidation:
    enabled: true
    min_facts_per_group: 2
    run_cron: "0 3 * * *"

# --- Threads: journal recurrence detection ---
threads:
  enabled: true
  similarity_threshold: 0.78
  min_entries_for_thread: 2
  candidate_count: 10

# --- Trending Radar: cross-source topic convergence ---
trending_radar:
  enabled: true
  min_sources: 2
  days: 7
  max_topics: 15
  interval_hours: 6

# --- Heartbeat: proactive intel-to-goal matching ---
heartbeat:
  enabled: true
  interval_minutes: 30
  heuristic_threshold: 0.3
  llm_budget_per_cycle: 0          # scheduler runs heuristic only (free)
  llm_budget_on_demand: 5          # LLM eval triggered on home page load
  notification_cooldown_hours: 4

# --- Curriculum / Learn ---
curriculum:
  enabled: true
  extra_content_dirs: []  # additional markdown guide directories
  questions_per_chapter: 5
  review_session_size: 20
  cross_domain_questions: true
  interleaving_ratio: 0.3

# --- Agentic Coaching ---
agent:
  enabled: true
  signals:
    schedule: "0 9 * * *"              # daily at 9am
    topic_mention_threshold: 3          # mentions/week to trigger research
    deadline_warning_days: 14           # days before CFP/event deadline alert
  autonomous:
    auto_research: true                 # auto-trigger research on hot topics
    auto_goal_suggestions: true         # create insight entries for emerging topics
    auto_check_in_reminders: true       # create reminder entries for stale goals
    max_actions_per_day: 5              # rate limit on autonomous actions
  coaching:
    blind_spot_detection: true
    celebration: true
