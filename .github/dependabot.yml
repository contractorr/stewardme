version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    ignore:
      # openapi-typescript@7 (contract generation) requires TypeScript ^5.x;
      # a TS major would break `npm install`. Revisit when openapi-typescript
      # supports TS 6+.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      npm-deps:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
