name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  # Never kill a deploy mid-SSH — queue instead. Cancelling between
  # git pull and `up -d` leaves new code with old containers.
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml

  validate:
    uses: ./.github/workflows/validate-deploy.yml

  deploy:
    needs: [test, validate]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd ~/stewardme
            git checkout -- .
            git pull origin main
            bash scripts/deploy-remote.sh
