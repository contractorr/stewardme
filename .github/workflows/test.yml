name: Tests

on:
  pull_request:
    branches: [main, master]
  workflow_call:

jobs:
  contracts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra all-providers --extra web

      - name: Verify exported contracts
        run: uv run python scripts/check_contracts.py

  specs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra all-providers --extra web

      - name: Verify spec harness
        run: uv run pytest tests/test_repo_manifest.py tests/test_specs_harness.py -q

  test-fast:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra all-providers --extra web

      - name: Run fast tests
        run: |
          uv run pytest -m "not slow and not web and not integration" --durations=20
        env:
          ANTHROPIC_API_KEY: test-key

  test-web:
    # PR merge gate for the API layer; main pushes cover web via extended-tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra all-providers --extra web

      - name: Run web route tests
        run: |
          uv run pytest -m "web" --durations=20
        env:
          ANTHROPIC_API_KEY: test-key

  coverage:
    runs-on: ubuntu-latest
    needs: [contracts, specs, test-fast]

    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra all-providers --extra web

      - name: Run coverage (fast + web suites)
        run: |
          uv run pytest -m "not slow" --cov=src --cov-report=xml --cov-report=term-missing --durations=20
        env:
          ANTHROPIC_API_KEY: test-key

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  extended-tests:
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    runs-on: ubuntu-latest
    needs: [contracts, specs, test-fast]

    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra all-providers --extra web

      - name: Run extended suites
        run: |
          uv run pytest -m "web or integration or slow" --durations=20
        env:
          ANTHROPIC_API_KEY: test-key
