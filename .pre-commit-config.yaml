default_install_hook_types: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix
        language: python
        additional_dependencies: ["ruff>=0.1.0,<1"]
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: python
        additional_dependencies: ["ruff>=0.1.0,<1"]
        types: [python]
      - id: web-lint
        name: web lint
        entry: npm --prefix web run lint
        language: system
        pass_filenames: false
        files: ^web/(src/.*\.(js|jsx|ts|tsx)|e2e/.*\.(js|jsx|ts|tsx)|eslint\.config\.mjs|next\.config\.ts|package\.json|tsconfig\.json|components\.json)$
