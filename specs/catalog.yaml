version: 1
description: >
  Machine-readable catalog for spec-driven development. Use this file to find
  the canonical spec set, separate tracked features from supporting specs, and
  keep AI agents on a stable navigation path.
canonical_artifacts:
  harness: specs/HARNESS.md
  feature_manifest: specs/manifest.yaml
  development_workflow: docs/development.md
  functional_template: specs/functional/TEMPLATE.md
  technical_template: specs/technical/TEMPLATE.md
  spec_validation: tests/test_specs_harness.py
lifecycle_statuses:
  tracked_features:
    - draft
    - ready_for_review
    - approved
    - partially_implemented
    - implemented
    - stable
    - experimental
    - archived
  tracked_modules:
    - draft
    - stable
    - updated
    - experimental
    - deprecated
    - archived
foundations:
  - specs/foundations/design-system.md
  - specs/foundations/ux-guidelines.md
